# 운영 DB 미구성 상태에서 로컬 실행을 위한 임시 H2 인메모리 설정
spring.datasource.url=jdbc:h2:mem:bodeum;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

bodeum.auth.jwt-secret=local-development-jwt-secret-32-bytes-minimum

bodeum.oauth.mock-enabled=true
bodeum.oauth.kakao.client-id=${KAKAO_CLIENT_ID:}

bodeum.oauth.naver.client-id=${NAVER_CLIENT_ID:}
bodeum.oauth.naver.client-secret=${NAVER_CLIENT_SECRET:}
